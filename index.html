<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pos System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #AF42ED;
        }

        .content-section{
            margin-left: 260px;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #AF42ED;
            height: auto;

        }
        #Login-content{
            margin-left: 0;
            height: 100vh;
        }


        .bg-icons i {
            margin-left: 260px;
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            z-index: 1;
            animation: rotateIcon 10s linear infinite;
        }

        #login-container {
            position: relative;
            width: 250px;
            height: 120px;
            background-color: #00061A;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 10;
            cursor: pointer;
        }

        #login-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #AF42ED);
            animation: rotateBorder 3s linear infinite;
        }

        #login-container::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: white;
            border-radius: 22px;
            z-index: 1;
        }

        #login-container.expanded {
            width: 700px;
            height: 450px;
            cursor: default;
        }

        #start-label {
            position: relative;
            z-index: 5;
            color: #AF42ED;
            font-weight: bold;
            font-size: 24px;
            margin: auto;
        }

        #main-content-border {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            transition: opacity 0.5s;

        }

        #login-img {
            flex: 1;
            position: relative;
            border-top-left-radius: 22px;
            border-bottom-left-radius: 22px;
            margin: 4px 4px;
            overflow: hidden;
        }

        .slider-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideImages 12s infinite;


        }

        .slider-image:nth-child(1) {
            background-image: url("MyPosSystem/assets/img/kids4.webp");
            animation-delay: 0s;
        }
        .slider-image:nth-child(2) {
            background-image: url("MyPosSystem/assets/img/kids3.webp");
            animation-delay: 3s;
        }
        .slider-image:nth-child(3) {
            background-image: url("MyPosSystem/assets/img/t-shirt w.jpg");
            animation-delay: 6s;
        }
        .slider-image:nth-child(4) {
            background-image: url("MyPosSystem/assets/img/frock3.webp");
            animation-delay: 9s;
        }

        #form-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #form-content > h2 {
            color: #AF42ED;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .fromGroup {
            position: relative;
            margin: 15px 0;
            width: 100%;
        }

        .fromGroup > input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            border: none;
            border-bottom: 2px solid #acacac;
            background-color: transparent;
            color: #333;
            outline: none;
            transition: 0.3s;
        }

        .fromGroup .fromLabel {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 16px;
            color: #acacac;
            pointer-events: none;
            transition: 0.3s;
        }

        .fromGroup > input:focus ~ .fromLabel,
        .fromGroup > input:not(:placeholder-shown) ~ .fromLabel {
            top: -15px;
            font-size: 12px;
            color: #AF42ED;
        }

        .fromGroup > input:focus {
            border-bottom-color: #AF42ED;
        }

        #login-btn {
            width: 100%;
            padding: 12px;
            background: #AF42ED;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        a {
            text-decoration: none;
            color: white;
        }
        #sidebar {
            /*position: fixed;*/
            left: 0;
            top: 0;
            width: 220px;
            height: 100%;
            background-color: #7A00CC;
            color: white;
            padding: 20px 20px 5px 20px;
            /*display: flex;*/
            flex-direction: column;

            display: none;
            position: fixed;

        }
        #shop-name {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1.5px solid rgba(255,255,255,0.1);

        }
        #shop-name > h1 {
            font-size: 24px;
            margin: 0;
        }
        #sidebar > ul {
            list-style: none;
            padding: 0;
            margin: 0;

        }
        #sidebar > ul > li {
            margin: 5px 0;

        }
        #sidebar ul li a {
            display: block;
            padding: 10px 18px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 16px;
        }
        #sidebar ul li a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
        #sidebar ul li a.active {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
        }
        #admin{
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }


        /*///////////////////////////////Keyframes//////////////////////////////////////*/
        @keyframes rotateIcon {
            from {
                transform: rotate(0deg);
            } to {
                transform: rotate(360deg);
            }
        }
        @keyframes rotateBorder {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }
        @keyframes slideImages {
            0% { opacity: 0; }
            10% { opacity: 1; }
            25% { opacity: 1; }
            35% { opacity: 0; }
            100% { opacity: 0; }
        }




    </style>
</head>

<body>

<main>


<!--///////////////////////////Login///////////////////////////////////////-->
<section id="Login-content" class="content-section">
    <div class="bg-icons">
        <i class="fa-solid fa-shirt" style="top:40%; left:10%; font-size: 30px;"></i>
        <i class="fa-solid fa-bag-shopping" style="top:20%; right:15%; font-size: 30px;"></i>
        <i class="fa-solid fa-socks" style="bottom:15%; left:20%; font-size: 30px;"></i>
        <i class="fa-solid fa-hat-wizard" style="bottom:20%; right:10%; font-size: 30px;"></i>
        <i class="fa-solid fa-vest" style="top:50%; left:80%; font-size: 30px;"></i>

        <i class="fa-solid fa-shirt" style="top:30%; left:70%; font-size: 30px;"></i>
        <i class="fa-solid fa-bag-shopping" style="top:10%; right:75%; font-size: 30px;"></i>
        <i class="fa-solid fa-socks" style="bottom:15%; left:20%; font-size: 30px;"></i>
        <i class="fa-solid fa-hat-wizard" style="bottom:20%; right:40%; font-size: 30px;"></i>
        <i class="fa-solid fa-vest" style="top:50%; left:30%; font-size: 30px;"></i>
    </div>

    <div id="login-container" onclick="expandBox()">
        <div id="start-label">LOGIN</div>

        <div id="main-content-border" style="display: none;">
            <div id="login-img">
                <div class="slider-image"></div>
                <div class="slider-image"></div>
                <div class="slider-image"></div>
                <div class="slider-image"></div>
            </div>

            <div id="form-content">
                <h2>Welcome</h2>
                <div class="fromGroup">
                    <input type="text" id="user-input" placeholder=" ">
                    <label class="fromLabel">USERNAME</label>
                </div>

                <div class="fromGroup">
                    <input type="password" id="pass-input" placeholder=" ">
                    <label class="fromLabel">PASSWORD</label>
                </div>

                <button id="login-btn">
                    <a href="">LOGIN</a>
                </button>
            </div>
        </div>
    </div>

</section>

<!--///////////////////////////aside////////////////////////////////////-->

    <aside id="sidebar">
        <div id="shop-name">
            <h1>Bela Fashion</h1>
            <p>Fashion</p>
        </div>

        <ul>
            <li><a href="#Dashboard-content" class="active">Dashboard</a></li>
            <li><a href="#Customer-content">Customer</a></li>
            <li><a href="#Item-content">Item</a></li>
            <li><a href="#Order-content">Place Order</a></li>
            <li><a href="#Order-Details-content">Order History</a></li>
        </ul>

        <div id="admin">
            <span>Admin (Manager)</span>
        </div>
    </aside>


<!--///////////////////////////Dashboard///////////////////////////////////////-->

<section id="Dashboard-content" class="content-section"></section>

<!--///////////////////////////Customer///////////////////////////////////////-->

<section id="Customer-content" class="content-section">
    <div></div>
</section>

<!--///////////////////////////Item///////////////////////////////////////-->

<section id="Item-content" class="content-section"></section>

<!--///////////////////////////Order///////////////////////////////////////-->

<section id="Order-content" class="content-section"></section>

<!--///////////////////////////Order-Details///////////////////////////////////////-->

<section id="Order-Details-content" class="content-section"></section>





<!--//////////////////////////////Js////////////////////////////////////////-->
<script>
    function expandBox() {
        const container = document.getElementById('login-container');
        const label = document.getElementById('start-label');
        const wrapper = document.getElementById('main-content-border');

        if(!container.classList.contains('expanded')) {
            container.classList.add('expanded');
            label.style.display = 'none';

            setTimeout(() => {
                wrapper.style.display = 'flex';
                setTimeout(() => wrapper.style.opacity = '1', 50);
            }, 600);
        }
    }

</script>
</main>
</body>
</html>
