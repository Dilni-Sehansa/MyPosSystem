<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Pink Petals POS System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background-color: #E0D9E3;
            /* overflow-y: hidden; */
        }
        #Login-content{
            margin-left: 0;
            height: 100vh;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #AF42ED;
            display: flex;
            z-index: 2000;
            width: 100%
        }
        .bg-icons i {
            margin-left: 260px;
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            z-index: 1;
            animation: rotateIcon 10s linear infinite;
        }
        #login-container {
            position: relative;
            width: 250px;
            height: 120px;
            background-color: #00061A;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 10;
            cursor: pointer;
        }
        #login-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #AF42ED);
            animation: rotateBorder 3s linear infinite;
        }
        #login-container::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: white;
            border-radius: 22px;
            z-index: 1;
        }
        #login-container.expanded {
            width: 700px;
            height: 450px;
            cursor: default;
        }
        #start-label {
            position: relative;
            z-index: 5;
            color: #AF42ED;
            font-weight: bold;
            font-size: 24px;
            margin: auto;
        }
        #main-content-border {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #login-img {
            flex: 1;
            position: relative;
            border-top-left-radius: 22px;
            border-bottom-left-radius: 22px;
            margin: 4px 4px;
            overflow: hidden;
        }
        .slider-image {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideImages 12s infinite;
        }
        .slider-image:nth-child(1) {
            background-image: url("MyPosSystem/assets/img/kids4.webp");
            animation-delay: 0s;
        }
        .slider-image:nth-child(2) {
            background-image: url("MyPosSystem/assets/img/kids3.webp");
            animation-delay: 3s;
        }
        .slider-image:nth-child(3) {
            background-image: url("MyPosSystem/assets/img/t-shirt w.jpg");
            animation-delay: 6s;
        }
        .slider-image:nth-child(4) {
            background-image: url("MyPosSystem/assets/img/frock3.webp");
            animation-delay: 9s;
        }
        #form-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #form-content > h2 {
            color: #AF42ED;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .fromGroup {
            position: relative;
            margin: 15px 0;
            width: 100%;
        }
        .fromGroup > input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            border: none;
            border-bottom: 2px solid #acacac;
            background-color: transparent;
            color: #333;
            outline: none;
            transition: 0.3s;
        }
        .fromGroup .fromLabel {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 16px;
            color: #acacac;
            pointer-events: none;
            transition: 0.3s;
        }
        .fromGroup > input:focus ~ .fromLabel,
        .fromGroup > input:not(:placeholder-shown) ~ .fromLabel {
            top: -15px;
            font-size: 12px;
            color: #AF42ED;
        }
        .fromGroup > input:focus {
            border-bottom-color: #AF42ED;
        }
        #login-btn {
            width: 100%;
            padding: 12px;
            background: #AF42ED;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        a {
            text-decoration: none;
            color: white;
        }
        @keyframes rotateIcon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateBorder {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes slideImages {
            0% { opacity: 0; }
            10% { opacity: 1; }
            25% { opacity: 1; }
            35% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* SPA Specific Styles */
        .spa-section {
            display: none;
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }
        .nav-item a {
            cursor: pointer;
        }
        .active-nav {
            background: rgba(255,255,255,0.1);
            color: white !important;
            border-radius: 10px;
        }

    </style>
</head>

<body>
<main>

    <!--///////////////////////////Login///////////////////////////////////////-->
    <section id="Login-content">
        <div class="bg-icons">
            <i class="fa-solid fa-shirt" style="top:40%; left:1%; font-size: 30px;"></i>
            <i class="fa-solid fa-bag-shopping" style="top:20%; right:15%; font-size: 30px;"></i>
            <i class="fa-solid fa-socks" style="bottom:15%; left:20%; font-size: 30px;"></i>
            <i class="fa-solid fa-hat-wizard" style="bottom:20%; right:10%; font-size: 30px;"></i>
            <i class="fa-solid fa-vest" style="top:50%; left:80%; font-size: 30px;"></i>
            <i class="fa-solid fa-shirt" style="top:30%; left:70%; font-size: 30px;"></i>
            <i class="fa-solid fa-bag-shopping" style="top:10%; right:75%; font-size: 30px;"></i>
            <i class="fa-solid fa-socks" style="bottom:15%; left:20%; font-size: 30px;"></i>
            <i class="fa-solid fa-hat-wizard" style="bottom:20%; right:40%; font-size: 30px;"></i>
            <i class="fa-solid fa-vest" style="top:50%; left:30%; font-size: 30px;"></i>
        </div>

        <div id="login-container" onclick="expandBox()">
            <div id="start-label">LOGIN</div>

            <div id="main-content-border" style="display: none;">
                <div id="login-img">
                    <div class="slider-image"></div>
                    <div class="slider-image"></div>
                    <div class="slider-image"></div>
                    <div class="slider-image"></div>
                </div>

                <div id="form-content">
                    <h2>Welcome</h2>
                    <div class="fromGroup">
                        <input type="text" id="user-input" placeholder=" ">
                        <label class="fromLabel">USERNAME</label>
                    </div>

                    <div class="fromGroup">
                        <input type="password" id="pass-input" placeholder=" ">
                        <label class="fromLabel">PASSWORD</label>
                    </div>

                    <button id="login-btn">LOGIN</button>
                </div>
            </div>
        </div>
    </section>

    <!--///////////////////////////Main Content///////////////////////////////////////-->
    <div id="main-app" style="display: none;">
        <!-- Sidebar -->
        <aside id="sidebar" class="position-fixed top-0 start-0" style="width: 260px; height: 100vh; background-color: #7A00CC; padding: 20px; color: white; z-index: 1000;">
            <div style="text-align: center; margin-bottom: 30px;border-bottom: 1px solid white ">
                <h3 style="font-weight: 600; margin: 0;">Pink Petals</h3>
                <p style="font-size: 12px; opacity: 0.8;">POS System</p>
            </div>
            <ul class="navbar-nav flex-grow-1">
                <li class="nav-item m-1"><a class="nav-link nav-btn active-nav" data-target="dashboard-section" style="color: rgba(255,255,255,0.7); padding: 10px 15px;">Dashboard</a></li>
                <li class="nav-item m-1"><a class="nav-link nav-btn" data-target="customer-section" style="color: rgba(255,255,255,0.7); padding: 10px 15px;">Customer</a></li>
                <li class="nav-item m-1"><a class="nav-link nav-btn" data-target="item-section" style="color: rgba(255,255,255,0.7); padding: 10px 15px;">Item</a></li>
                <li class="nav-item m-1"><a class="nav-link nav-btn" data-target="order-section" style="color: rgba(255,255,255,0.7); padding: 10px 15px;">Order</a></li>
                <li class="nav-item m-1"><a class="nav-link nav-btn" data-target="order-details-section" style="color: rgba(255,255,255,0.7); padding: 10px 15px;">Order Details</a></li>
                <li class="nav-item m-1"><a class="nav-link" id="logout-btn" style="color: rgba(255,255,255,0.7); background-color: red;padding: 10px 15px; border-radius: 10px; margin-top: 50px; cursor: pointer;"><i class="fa-solid fa-arrow-right-from-bracket" style="color: rgb(255, 255, 255);"></i> LogOut</a></li>
            </ul>
        </aside>

        <!-- Dashboard Section -->
        <section id="dashboard-section" class="spa-section" style="display: block;">
            <h2 style="color: #7A00CC; font-weight: 600; margin-bottom: 25px;">Dashboard</h2>
            <div class="row">
                <div class="col-md-4">
                    <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                        <h3 style="color: #AF42ED;">Total Customers</h3>
                        <h1 id="dash-customers-count" style="font-weight: bold; color: #333;">0</h1>
                    </div>
                </div>
                <div class="col-md-4">
                    <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                        <h3 style="color: #AF42ED;">Total Items</h3>
                        <h1 id="dash-items-count" style="font-weight: bold; color: #333;">0</h1>
                    </div>
                </div>
                <div class="col-md-4">
                    <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;">
                        <h3 style="color: #AF42ED;">Total Orders</h3>
                        <h1 id="dash-orders-count" style="font-weight: bold; color: #333;">0</h1>
                    </div>
                </div>
            </div>
        </section>


    </div>

</main>

<!--//////////////////////////////Js////////////////////////////////////////-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Controllers -->
<script src="MyPosSystem/Controller/loginController.js"></script>
<script src="MyPosSystem/Controller/SidebarController.js"></script>


</body>
</html>
